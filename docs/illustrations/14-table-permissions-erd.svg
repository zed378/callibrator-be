<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580">
  <defs>
    <linearGradient id="modelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="permGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rolePerfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tenantRolePerfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rolesGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tenantRolesGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>
  <rect width="900" height="580" fill="#f8fafc" rx="8"/>
  <text x="450" y="28" text-anchor="middle" fill="#1e293b" font-family="system-ui" font-size="16" font-weight="bold">Entity Relationship Diagram</text>

  <!-- Models Table -->
  <rect x="20" y="50" width="200" height="160" rx="8" fill="url(#modelGrad)" stroke="#4338ca" stroke-width="2"/>
  <text x="120" y="75" text-anchor="middle" fill="white" font-family="system-ui" font-size="13" font-weight="bold">Models</text>
  <line x1="20" y1="85" x2="220" y2="85" stroke="white" stroke-opacity="0.3"/>
  <text x="30" y="102" fill="#e0e7ff" font-family="monospace" font-size="11">id (PK: UUID)</text>
  <text x="30" y="120" fill="#e0e7ff" font-family="monospace" font-size="11">modelName (string)</text>
  <text x="30" y="138" fill="#e0e7ff" font-family="monospace" font-size="11">tableName (string)</text>
  <text x="30" y="156" fill="#e0e7ff" font-family="monospace" font-size="11">module (string)</text>
  <text x="30" y="174" fill="#e0e7ff" font-family="monospace" font-size="11">description (text)</text>
  <text x="30" y="192" fill="#e0e7ff" font-family="monospace" font-size="11">isActive (boolean)</text>

  <!-- TablePermission Table -->
  <rect x="350" y="50" width="220" height="180" rx="8" fill="url(#permGrad)" stroke="#1d4ed8" stroke-width="2"/>
  <text x="460" y="75" text-anchor="middle" fill="white" font-family="system-ui" font-size="13" font-weight="bold">TablePermission</text>
  <line x1="350" y1="85" x2="570" y2="85" stroke="white" stroke-opacity="0.3"/>
  <text x="360" y="102" fill="#dbeafe" font-family="monospace" font-size="11">id (PK: UUID)</text>
  <text x="360" y="120" fill="#dbeafe" font-family="monospace" font-size="11">modelId (FK)</text>
  <text x="360" y="138" fill="#dbeafe" font-family="monospace" font-size="11">action (ENUM)</text>
  <text x="360" y="156" fill="#dbeafe" font-family="monospace" font-size="11">scope (ENUM)</text>
  <text x="360" y="174" fill="#dbeafe" font-family="monospace" font-size="11">attributes (JSONB)</text>
  <text x="360" y="192" fill="#dbeafe" font-family="monospace" font-size="11">abacRules (JSONB)</text>
  <text x="360" y="210" fill="#dbeafe" font-family="monospace" font-size="11">description (text)</text>

  <!-- RolePermission Table -->
  <rect x="20" y="280" width="220" height="140" rx="8" fill="url(#rolePerfGrad)" stroke="#047857" stroke-width="2"/>
  <text x="130" y="305" text-anchor="middle" fill="white" font-family="system-ui" font-size="13" font-weight="bold">RolePermission</text>
  <line x1="20" y1="315" x2="240" y2="315" stroke="white" stroke-opacity="0.3"/>
  <text x="30" y="332" fill="#d1fae5" font-family="monospace" font-size="11">id (PK: UUID)</text>
  <text x="30" y="350" fill="#d1fae5" font-family="monospace" font-size="11">roleId (FK)</text>
  <text x="30" y="368" fill="#d1fae5" font-family="monospace" font-size="11">tablePermissionId (FK)</text>
  <text x="30" y="386" fill="#d1fae5" font-family="monospace" font-size="11">isGranted (boolean)</text>
  <text x="30" y="404" fill="#d1fae5" font-family="monospace" font-size="11">expiresAt (date)</text>
  <text x="30" y="422" fill="#d1fae5" font-family="monospace" font-size="11">description (text)</text>

  <!-- TenantRolePermission Table -->
  <rect x="620" y="280" width="250" height="160" rx="8" fill="url(#tenantRolePerfGrad)" stroke="#b45309" stroke-width="2"/>
  <text x="745" y="305" text-anchor="middle" fill="white" font-family="system-ui" font-size="13" font-weight="bold">TenantRolePermission</text>
  <line x1="620" y1="315" x2="870" y2="315" stroke="white" stroke-opacity="0.3"/>
  <text x="630" y="332" fill="#fef3c7" font-family="monospace" font-size="11">id (PK: UUID)</text>
  <text x="630" y="350" fill="#fef3c7" font-family="monospace" font-size="11">tenantRoleId (FK)</text>
  <text x="630" y="368" fill="#fef3c7" font-family="monospace" font-size="11">tablePermissionId (FK)</text>
  <text x="630" y="386" fill="#fef3c7" font-family="monospace" font-size="11">isGranted (boolean)</text>
  <text x="630" y="404" fill="#fef3c7" font-family="monospace" font-size="11">expiresAt (date)</text>
  <text x="630" y="422" fill="#fef3c7" font-family="monospace" font-size="11">abacRules (JSONB)</text>
  <text x="630" y="440" fill="#fef3c7" font-family="monospace" font-size="11">description (text)</text>

  <!-- Roles Table -->
  <rect x="350" y="280" width="200" height="100" rx="8" fill="url(#rolesGrad)" stroke="#6d28d9" stroke-width="2"/>
  <text x="450" y="305" text-anchor="middle" fill="white" font-family="system-ui" font-size="13" font-weight="bold">Roles</text>
  <line x1="350" y1="315" x2="550" y2="315" stroke="white" stroke-opacity="0.3"/>
  <text x="360" y="332" fill="#ede9fe" font-family="monospace" font-size="11">id (PK: UUID)</text>
  <text x="360" y="350" fill="#ede9fe" font-family="monospace" font-size="11">name (string)</text>
  <text x="360" y="368" fill="#ede9fe" font-family="monospace" font-size="11">roleLevel (string)</text>
  <text x="360" y="386" fill="#ede9fe" font-family="monospace" font-size="11">description (text)</text>

  <!-- TenantRoles Table -->
  <rect x="620" y="50" width="220" height="100" rx="8" fill="url(#tenantRolesGrad)" stroke="#be185d" stroke-width="2"/>
  <text x="730" y="75" text-anchor="middle" fill="white" font-family="system-ui" font-size="13" font-weight="bold">TenantRoles</text>
  <line x1="620" y1="85" x2="840" y2="85" stroke="white" stroke-opacity="0.3"/>
  <text x="630" y="102" fill="#fce7f3" font-family="monospace" font-size="11">id (PK: UUID)</text>
  <text x="630" y="120" fill="#fce7f3" font-family="monospace" font-size="11">tenantId (FK)</text>
  <text x="630" y="138" fill="#fce7f3" font-family="monospace" font-size="11">name (string)</text>
  <text x="630" y="156" fill="#fce7f3" font-family="monospace" font-size="11">level (integer)</text>

  <!-- Relationships -->
  <line x1="220" y1="100" x2="350" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="275" y="92" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">1</text>
  <text x="340" y="92" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">N</text>

  <line x1="460" y1="230" x2="460" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="460" y="255" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">1</text>

  <line x1="450" y1="380" x2="240" y2="350" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="370" y="365" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">1</text>

  <line x1="730" y1="150" x2="745" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="730" y="210" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">1</text>

  <line x1="570" y1="140" x2="620" y2="320" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="590" y="220" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">1</text>
</svg>