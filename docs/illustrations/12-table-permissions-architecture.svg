<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">\n  <defs>\n    <linearGradient id="authGradient" x1="0%" y1="0%" x2="100%" y2="100%">\n      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />\n      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />\n    </linearGradient>\n    <linearGradient id="middlewareGradient" x1="0%" y1="0%" x2="100%" y2="100%">\n      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />\n      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />\n    </linearGradient>\n    <linearGradient id="serviceGradient" x1="0%" y1="0%" x2="100%" y2="100%">\n      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />\n      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />\n    </linearGradient>\n    <linearGradient id="dbGradient" x1="0%" y1="0%" x2="100%" y2="100%">\n      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />\n      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />\n    </linearGradient>\n    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">\n      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />\n    </marker>\n  </defs>\n  <rect width="800" height="420" fill="#f8fafc" rx="8"/>\n  <rect x="250" y="15" width="300" height="60" rx="8" fill="url(#authGradient)" stroke="#4f46e5" stroke-width="2"/>\n  <text x="400" y="40" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" font-weight="bold">AUTHENTICATION</text>\n  <text x="400" y="58" text-anchor="middle" fill="#e0e7ff" font-family="system-ui" font-size="11">(JWT)</text>\n  <line x1="400" y1="75" x2="400" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>\n  <rect x="150" y="100" width="500" height="80" rx="8" fill="url(#middlewareGradient)" stroke="#2563eb" stroke-width="2"/>\n  <text x="400" y="125" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" font-weight="bold">dynamicAccess Middleware</text>\n  <text x="400" y="143" text-anchor="middle" fill="#dbeafe" font-family="system-ui" font-size="10">Check user role against table_permissions</text>\n  <text x="400" y="158" text-anchor="middle" fill="#dbeafe" font-family="system-ui" font-size="10">Evaluate ABAC rules</text>\n  <text x="400" y="173" text-anchor="middle" fill="#dbeafe" font-family="system-ui" font-size="10">Apply column-level filtering</text>\n  <line x1="400" y1="180" x2="400" y2="205" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>\n  <rect x="150" y="205" width="500" height="80" rx="8" fill="url(#serviceGradient)" stroke="#0284c7" stroke-width="2"/>\n  <text x="400" y="230" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" font-weight="bold">TablePermission Service</text>\n  <text x="400" y="248" text-anchor="middle" fill="#e0f2fe" font-family="system-ui" font-size="10">checkUserPermission() - Core permission check</text>\n  <text x="400" y="263" text-anchor="middle" fill="#e0f2fe" font-family="system-ui" font-size="10">getUserAllowedAttributes() - Get allowed columns</text>\n  <line x1="250" y1="285" x2="200" y2="310" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>\n  <line x1="400" y1="285" x2="400" y2="310" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>\n  <line x1="550" y1="285" x2="600" y2="310" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>\n  <rect x="50" y="310" width="700" height="100" rx="8" fill="url(#dbGradient)" stroke="#047857" stroke-width="2"/>\n  <text x="400" y="335" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" font-weight="bold">Database Models</text>\n  <rect x="80" y="348" width="140" height="50" rx="4" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1" stroke-opacity="0.5"/>\n  <text x="150" y="367" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="bold">Models</text>\n  <text x="150" y="382" text-anchor="middle" fill="#d1fae5" font-family="system-ui" font-size="9">User, Invoice, Device</text>\n  <rect x="260" y="348" width="280" height="50" rx="4" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1" stroke-opacity="0.5"/>\n  <text x="400" y="367" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="bold">TablePermission</text>\n  <text x="400" y="382" text-anchor="middle" fill="#d1fae5" font-family="system-ui" font-size="9">Permissions for each model/action</text>\n  <rect x="560" y="348" width="160" height="50" rx="4" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1" stroke-opacity="0.5"/>\n  <text x="640" y="367" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="bold">Roles / TenantRoles</text>\n  <text x="640" y="382" text-anchor="middle" fill="#d1fae5" font-family="system-ui" font-size="9">SUPER_ADMIN, admin...</text>\n</svg>